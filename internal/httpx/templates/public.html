{{define "public.html"}}<!doctype html>
<html lang="en" class="bg-neutral-950 text-neutral-100">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>{{.StationName}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
  <main class="w-full max-w-md flex flex-col items-center gap-6">
    <div class="w-full aspect-square rounded-2xl overflow-hidden bg-neutral-900 shadow-2xl flex items-center justify-center">
      <img id="art" alt="" class="w-full h-full object-cover hidden">
      <div id="art-fallback" class="text-neutral-700 text-7xl">&#9835;</div>
    </div>

    <div class="text-center w-full">
      <h1 id="title" class="text-2xl font-semibold truncate">&nbsp;</h1>
      <p id="artist" class="text-neutral-400 text-lg truncate">&nbsp;</p>
      <p id="next" class="text-neutral-500 text-sm mt-2 truncate">&nbsp;</p>
    </div>

    <div class="flex items-center gap-4 w-full justify-center">
      <button id="play" class="w-16 h-16 rounded-full bg-white text-neutral-900 flex items-center justify-center text-2xl shadow-lg active:scale-95 transition" aria-label="Play">&#9654;</button>
    </div>

    <div class="w-full flex items-center gap-3">
      <span class="text-xs text-neutral-500 w-10 text-right">Vol</span>
      <input id="vol" type="range" min="0" max="100" value="80" class="w-full accent-white">
    </div>

    <details class="w-full bg-neutral-900 rounded-xl p-4 text-sm">
      <summary class="cursor-pointer text-neutral-300">Tune in</summary>
      <div class="mt-3 space-y-2">
        <div class="flex gap-2 items-center">
          <span class="w-16 text-neutral-500">Direct</span>
          <input readonly value="{{.DirectURL}}" class="flex-1 bg-neutral-950 border border-neutral-800 rounded px-2 py-1 text-xs">
        </div>
        <div class="flex gap-2 items-center">
          <span class="w-16 text-neutral-500">PLS</span>
          <input readonly value="{{.PLSURL}}" class="flex-1 bg-neutral-950 border border-neutral-800 rounded px-2 py-1 text-xs">
        </div>
        <div class="flex gap-2 items-center">
          <span class="w-16 text-neutral-500">M3U</span>
          <input readonly value="{{.M3UURL}}" class="flex-1 bg-neutral-950 border border-neutral-800 rounded px-2 py-1 text-xs">
        </div>
        <div class="flex gap-2 items-center">
          <span class="w-16 text-neutral-500">HLS</span>
          <input readonly value="{{.HLSURL}}" class="flex-1 bg-neutral-950 border border-neutral-800 rounded px-2 py-1 text-xs">
        </div>
      </div>
    </details>

    <p id="listeners" class="text-xs text-neutral-600">&nbsp;</p>
  </main>

  <audio id="player" preload="none" crossorigin="anonymous"></audio>
  <script src="/static/app.js"></script>
</body>
</html>{{end}}
