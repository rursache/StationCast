{{define "public.html"}}<!doctype html>
<html lang="en" class="bg-neutral-950 text-neutral-100">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>{{.StationName}}</title>
  <link rel="icon" type="image/svg+xml" href="/static/icon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="h-screen overflow-hidden">

  <!-- Ambient backdrop driven by current album art -->
  <div id="backdrop" class="fixed inset-0 -z-10 bg-neutral-950 transition-opacity duration-1000"></div>
  <div class="fixed inset-0 -z-10 bg-gradient-to-b from-neutral-950/60 via-neutral-950/85 to-neutral-950"></div>

  <header class="fixed top-0 left-0 right-0 z-10 px-5 py-4 flex items-center justify-between text-sm">
    <div class="flex items-center gap-2">
      <span class="relative flex h-2 w-2">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-500 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-2 w-2 bg-rose-500"></span>
      </span>
      <span class="text-[11px] uppercase tracking-widest text-rose-400 font-medium">Live</span>
      <span class="text-neutral-500 ml-2 truncate max-w-[40vw]">{{.StationName}}</span>
    </div>
    <div id="listeners-badge" class="text-xs text-neutral-500 flex items-center gap-1.5">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-3.5 h-3.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19V5l12-2v14"/><circle cx="6" cy="19" r="3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="18" cy="16" r="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span id="listeners">0</span>
    </div>
  </header>

  <main class="h-full flex flex-col items-center justify-center px-6 pt-16 pb-8 gap-6">

    <div class="relative w-full max-w-[18rem] aspect-square rounded-3xl overflow-hidden bg-neutral-900 shadow-[0_30px_80px_-20px_rgba(0,0,0,0.8)] ring-1 ring-white/5">
      <img id="art" alt="" class="absolute inset-0 w-full h-full object-cover hidden transition-opacity duration-500">
      <div id="art-fallback" class="absolute inset-0 flex items-center justify-center">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" class="w-24 h-24 text-neutral-700"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19V5l12-2v14"/><circle cx="6" cy="19" r="3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="18" cy="16" r="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>

    <div class="text-center w-full max-w-md min-h-[80px]">
      <h1 id="title" class="text-2xl md:text-3xl font-semibold truncate">&nbsp;</h1>
      <p id="artist" class="text-neutral-300 text-base md:text-lg truncate mt-1">&nbsp;</p>
      <p id="next" class="text-neutral-500 text-xs mt-3 uppercase tracking-wider line-clamp-2 leading-snug">&nbsp;</p>
    </div>

    <div class="flex items-center gap-6">
      <button id="play" aria-label="Play" class="group w-20 h-20 rounded-full bg-white text-neutral-900 flex items-center justify-center shadow-2xl shadow-white/10 hover:scale-105 active:scale-95 transition">
        <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8 ml-1"><path d="M8 5v14l11-7z"/></svg>
        <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8 hidden"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
      </button>
    </div>

    <div class="w-full max-w-sm flex items-center gap-3">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4 text-neutral-500"><path stroke-linecap="round" stroke-linejoin="round" d="M5 9v6h4l5 5V4L9 9H5z"/></svg>
      <input id="vol" type="range" min="0" max="100" value="100" class="flex-1 accent-white">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4 text-neutral-500"><path stroke-linecap="round" stroke-linejoin="round" d="M5 9v6h4l5 5V4L9 9H5zM15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14"/></svg>
    </div>

    <div class="w-full max-w-sm flex items-center gap-3">
      <button id="open-streams" type="button" class="flex-1 inline-flex items-center justify-center gap-2 bg-neutral-900/40 hover:bg-neutral-900/70 backdrop-blur border border-neutral-800 rounded-xl px-4 py-2.5 text-sm text-neutral-200 transition">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h7"/></svg>
        Stream Links
      </button>
      <button id="open-history" type="button" class="flex-1 inline-flex items-center justify-center gap-2 bg-neutral-900/40 hover:bg-neutral-900/70 backdrop-blur border border-neutral-800 rounded-xl px-4 py-2.5 text-sm text-neutral-200 transition">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 2M12 21a9 9 0 100-18 9 9 0 000 18z"/></svg>
        History
      </button>
    </div>
  </main>

  <!-- Stream Links modal -->
  <div id="modal-streams" class="fixed inset-0 z-20 hidden items-center justify-center p-6" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modal-streams-title">
    <div class="modal-backdrop absolute inset-0 bg-black/70 backdrop-blur-sm"></div>
    <div class="relative w-full max-w-md max-h-[80vh] flex flex-col bg-neutral-900/95 backdrop-blur border border-neutral-800 rounded-2xl shadow-2xl">
      <div class="flex items-center justify-between px-5 py-4 border-b border-neutral-800 flex-shrink-0">
        <h2 id="modal-streams-title" class="text-base font-semibold">Stream Links</h2>
        <button class="modal-close text-neutral-400 hover:text-white p-1" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="px-5 py-4 space-y-2 text-sm overflow-y-auto">
        <div class="grid grid-cols-[5rem_1fr_auto] gap-2 items-center">
          <span class="text-neutral-500 text-xs">Direct</span>
          <input readonly value="{{.DirectURL}}" class="bg-neutral-950/60 border border-neutral-800 rounded px-2 py-1 text-xs truncate">
          <button class="copy text-neutral-400 hover:text-white px-2 py-1 text-xs" data-copy="{{.DirectURL}}">copy</button>
        </div>
        <div class="grid grid-cols-[5rem_1fr_auto] gap-2 items-center">
          <span class="text-neutral-500 text-xs">PLS</span>
          <input readonly value="{{.PLSURL}}" class="bg-neutral-950/60 border border-neutral-800 rounded px-2 py-1 text-xs truncate">
          <button class="copy text-neutral-400 hover:text-white px-2 py-1 text-xs" data-copy="{{.PLSURL}}">copy</button>
        </div>
        <div class="grid grid-cols-[5rem_1fr_auto] gap-2 items-center">
          <span class="text-neutral-500 text-xs">M3U</span>
          <input readonly value="{{.M3UURL}}" class="bg-neutral-950/60 border border-neutral-800 rounded px-2 py-1 text-xs truncate">
          <button class="copy text-neutral-400 hover:text-white px-2 py-1 text-xs" data-copy="{{.M3UURL}}">copy</button>
        </div>
        <div class="grid grid-cols-[5rem_1fr_auto] gap-2 items-center">
          <span class="text-neutral-500 text-xs">HLS</span>
          <input readonly value="{{.HLSURL}}" class="bg-neutral-950/60 border border-neutral-800 rounded px-2 py-1 text-xs truncate">
          <button class="copy text-neutral-400 hover:text-white px-2 py-1 text-xs" data-copy="{{.HLSURL}}">copy</button>
        </div>
      </div>
    </div>
  </div>

  <!-- History modal -->
  <div id="modal-history" class="fixed inset-0 z-20 hidden items-center justify-center p-6" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modal-history-title">
    <div class="modal-backdrop absolute inset-0 bg-black/70 backdrop-blur-sm"></div>
    <div class="relative w-full max-w-[620px] max-h-[80vh] flex flex-col bg-neutral-900/95 backdrop-blur border border-neutral-800 rounded-2xl shadow-2xl">
      <div class="flex items-center justify-between px-5 py-4 border-b border-neutral-800 flex-shrink-0">
        <h2 id="modal-history-title" class="text-base font-semibold">History</h2>
        <button class="modal-close text-neutral-400 hover:text-white p-1" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <ol id="history-list" class="px-3 py-3 space-y-1.5 text-sm overflow-y-auto">
        <li class="text-neutral-500 italic px-2 py-2">Loading…</li>
      </ol>
    </div>
  </div>

  <audio id="player" preload="none" crossorigin="anonymous"></audio>
  <script src="/static/app.js"></script>
</body>
</html>{{end}}
