name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re-)release"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Build cross-platform binaries
        run: |
          mkdir -p dist
          for os in linux darwin; do
            for arch in amd64 arm64; do
              echo "→ $os/$arch"
              CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build \
                -trimpath -ldflags="-s -w -X main.version=${{ steps.tag.outputs.name }}" \
                -o dist/stationcast-$os-$arch \
                ./cmd/stationcast
            done
          done
          (cd dist && shasum -a 256 stationcast-* > SHA256SUMS)
          ls -la dist/

      - name: Extract release notes from tag annotation
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          NOTES=$(git tag -l --format='%(contents)' "$TAG")
          if [ -z "$NOTES" ]; then
            NOTES="Release $TAG"
          fi
          echo "$NOTES" > /tmp/release_notes.md
          echo "----- notes -----"
          cat /tmp/release_notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release exists, deleting and recreating"
            gh release delete "$TAG" --yes
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release_notes.md \
            dist/stationcast-linux-amd64 \
            dist/stationcast-linux-arm64 \
            dist/stationcast-darwin-amd64 \
            dist/stationcast-darwin-arm64 \
            dist/SHA256SUMS
