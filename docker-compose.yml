services:
  stationcast:
    image: ghcr.io/rursache/stationcast:latest
    container_name: stationcast
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./music:/music:rw
      - ./data:/data
    environment:
      # PUID: "1000"
      # PGID: "1000"
      STATIONCAST_ADMIN_PASSWORD: changeme
      STATIONCAST_STATION_NAME: StationCast
      STATIONCAST_BITRATE: "128"
      STATIONCAST_LOUDNORM: "false"
      # STATIONCAST_REPLAYGAIN: "false"
      STATIONCAST_ITUNES_ART: "true"
      STATIONCAST_MAX_LISTENERS: "256"
      # STATIONCAST_STATION_GENRE: Various
      # STATIONCAST_GAIN_DB: "0"
      # STATIONCAST_PUBLIC_URL: https://radio.example.com
      # STATIONCAST_RECAPTCHA_SITE_KEY: <optional google reCAPTCHA v3 site key>
      # STATIONCAST_RECAPTCHA_SECRET_KEY: <matching reCAPTCHA v3 secret>

